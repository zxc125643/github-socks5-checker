name: Update SOCKS5 list

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-socks5
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch, check and rank public SOCKS5 nodes
        env:
          MAX_CANDIDATES: "300"
          MAX_RESULTS: "100"
          CONCURRENCY: "16"
          TIMEOUT_MS: "35000"
        run: node scripts/update-socks5.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh checked SOCKS5 nodes"
          git push

name: Update SOCKS5 list

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-socks5
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch, check and rank public SOCKS5 nodes
        env:
          MAX_CANDIDATES: "2000"
          MAX_RESULTS: "100"
          CONCURRENCY: "24"
          TIMEOUT_MS: "35000"
          MAX_LATENCY_MS: "15000"
          LOCAL_CHECK: "true"
          LOCAL_TIMEOUT_MS: "10000"
          LOCAL_MAX_LATENCY_MS: "8000"
          LOCAL_REQUIRED_SUCCESSES: "2"
          LOCAL_TEST_TARGETS: "https://www.gstatic.com/generate_204=204,https://www.cloudflare.com/cdn-cgi/trace=200"
          MIN_PURITY_SCORE: "4.2"
          PUBLISH_ONLY_CLEAN: "false"
          RETAIN_PREVIOUS_ON_EMPTY: "false"
        run: node scripts/update-socks5.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh checked SOCKS5 nodes"
          git push
